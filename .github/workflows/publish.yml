name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: true
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/nextjs-demo/package-lock.json
            examples/express-demo/package-lock.json
            examples/hono-demo/package-lock.json
            examples/tanstack-start-demo/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Verify package
        run: npm run ci:check

      - name: Ensure release tag matches package version
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          if [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish package
        run: npm publish
