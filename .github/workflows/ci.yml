name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package Checks (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/nextjs-demo/package-lock.json
            examples/express-demo/package-lock.json
            examples/hono-demo/package-lock.json
            examples/tanstack-start-demo/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run package verification
        run: npm run ci:check

  examples:
    name: Example Typecheck (${{ matrix.example }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - nextjs-demo
          - express-demo
          - hono-demo
          - tanstack-start-demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/nextjs-demo/package-lock.json
            examples/express-demo/package-lock.json
            examples/hono-demo/package-lock.json
            examples/tanstack-start-demo/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install ${{ matrix.example }} dependencies
        run: npm ci --prefix examples/${{ matrix.example }}

      - name: Typecheck ${{ matrix.example }}
        run: npm run typecheck --prefix examples/${{ matrix.example }}
