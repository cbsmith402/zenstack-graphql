table:
  schema: public
  name: users
array_relationships:
  - name: posts
    using:
      foreign_key_constraint_on:
        column: author_id
        table:
          schema: public
          name: posts
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - email
      filter:
        id:
          _eq: X-Hasura-User-Id
insert_permissions:
  - role: admin
    permission:
      check: {}
